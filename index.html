<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D坦克大战</title>
</head>
<body>
  <div id="game-canvas"></div>

  <!-- 菜单界面 -->
  <div id="menu-screen">
    <h1 class="game-title">坦克大战</h1>
    <p class="game-subtitle">3D 版</p>
    <div class="mode-selection">
      <h2>选择模式</h2>
      <button class="mode-btn selected">双人对战 (PvP)</button>
      <button class="mode-btn">人机对战 (PvE)</button>
    </div>
    <button id="menu-leaderboard-btn" class="menu-leaderboard-btn">🏆 排行榜</button>
    <p class="menu-hint">↑↓ 选择 &nbsp; Enter 确认</p>
  </div>

  <!-- HUD -->
  <div id="hud" style="display:none">
    <div id="hud-left">
      <span id="p1-score">击杀: 0</span>
      <div class="hp-bar"><div id="p1-hp"></div></div>
      <span id="help-p1">玩家1: WASD移动 | 空格射击</span>
    </div>
    <div id="hud-right">
      <span id="p2-score">击杀: 0</span>
      <div class="hp-bar"><div id="p2-hp"></div></div>
      <span id="help-p2"></span>
    </div>
    <div id="hud-center">
      <span id="p2-name">玩家2</span>
      <span id="level-badge" style="display:none">第 1 关</span>
      <span id="respawn-text"></span>
    </div>
    <div id="hud-bottom">
      <span>1俯视 2斜角 3近景 4第一人称 5分屏</span>
      <span>主题: <span id="theme-indicator">明亮</span> [C切换]</span>
      <button id="hud-pause-btn" class="hud-bottom-btn" title="暂停">⏸ 暂停</button>
    </div>
  </div>

  <!-- 游戏结束 -->
  <div id="gameover-screen" style="display:none">
    <h1 id="winner-text"></h1>
    <p>按 R 重新开始 | ESC 返回菜单</p>
  </div>

  <!-- 暂停界面 -->
  <div id="pause-screen" style="display:none">
    <h1>暂 停</h1>
    <div class="pause-buttons">
      <button id="resume-btn" class="pause-btn">▶ 继续游戏</button>
      <button id="quit-btn" class="pause-btn quit">✕ 退出菜单</button>
    </div>
  </div>

  <!-- 关卡过渡 -->
  <div id="level-overlay" style="display:none">
    <h1 id="level-result-text"></h1>
    <p id="level-hint-text"></p>
    <div id="level-buttons">
      <button id="level-next-btn" class="level-btn">进入下一关</button>
      <button id="level-retry-btn" class="level-btn">重试本关</button>
      <button id="level-quit-btn" class="level-btn quit">返回菜单</button>
    </div>
  </div>

  <!-- 名字输入弹层（人机对战失败后） -->
  <div id="name-overlay" style="display:none">
    <h1>留下大名</h1>
    <p>止步第 <span id="name-level-text">?</span> 关</p>
    <div id="name-input-row">
      <input id="name-input" type="text" maxlength="16" placeholder="输入你的名字" autocomplete="off" />
      <button id="name-save-btn" class="level-btn">保存成绩</button>
    </div>
    <button id="name-skip-btn" class="level-btn quit">跳过</button>
  </div>

  <!-- 排行榜弹层 -->
  <div id="leaderboard-overlay" style="display:none">
    <h1 class="lb-title">🏆 排行榜</h1>
    <div id="lb-table-wrap">
      <table id="lb-table">
        <thead>
          <tr><th>排名</th><th>名字</th><th>最高关卡</th><th>日期</th></tr>
        </thead>
        <tbody id="lb-body"></tbody>
      </table>
    </div>
    <div id="lb-loading" style="display:none">加载中...</div>
    <div id="lb-empty" style="display:none">暂无记录，快来挑战吧！</div>
    <button id="lb-close-btn" class="level-btn quit">关闭</button>
  </div>

  <canvas id="minimap" width="80" height="80"></canvas>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
