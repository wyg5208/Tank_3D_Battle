<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D坦克大战</title>
</head>
<body>
  <div id="game-canvas"></div>

  <!-- 菜单界面 -->
  <div id="menu-screen">
    <h1 class="game-title">坦 克 大 战</h1>
    <p class="game-subtitle">3D 版</p>
    <div class="mode-selection">
      <h2>选择模式</h2>
      <button class="mode-btn selected">双人对战 (PvP)</button>
      <button class="mode-btn">人机对战 (PvE)</button>
    </div>
    <p class="menu-hint">↑↓ 选择 &nbsp; Enter 确认</p>
  </div>

  <!-- HUD -->
  <div id="hud" style="display:none">
    <div id="hud-left">
      <span id="p1-score">击杀: 0</span>
      <div class="hp-bar"><div id="p1-hp"></div></div>
      <span id="help-p1">玩家1: WASD移动 | 空格射击</span>
    </div>
    <div id="hud-right">
      <span id="p2-score">击杀: 0</span>
      <div class="hp-bar"><div id="p2-hp"></div></div>
      <span id="help-p2"></span>
    </div>
    <div id="hud-center">
      <span id="p2-name">玩家2</span>
      <span id="respawn-text"></span>
    </div>
    <div id="hud-bottom">
      <span>1俯视 2斜角 3近景 4第一人称 5分屏</span>
      <span>主题: <span id="theme-indicator">明亮</span> [C切换]</span>
    </div>
  </div>

  <!-- 游戏结束 -->
  <div id="gameover-screen" style="display:none">
    <h1 id="winner-text"></h1>
    <p>按 R 重新开始 | ESC 返回菜单</p>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
